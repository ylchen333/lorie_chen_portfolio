    <div class="hero">
      <h1>playlab</h1>
      <p class="tagline">one-off experiments in p5.js, comfyui, and plotting</p>
    </div>
  </header>

  <main>

    <div class="playlab-filters">
      <button class="filter-btn active" data-filter="all">all</button>
      <button class="filter-btn" data-filter="plotting">plotting</button>
      <button class="filter-btn" data-filter="p5.js">p5.js</button>
      <button class="filter-btn" data-filter="comfyui">comfyui</button>
    </div>

    <div class="playlab-grid">

      <div class="experiment" data-title="reaction diffusion contours" data-tag="plotting">
        <img class="exp-thumb" src="images/plotting_art/reaction_diffusion_contours/AK2A6369.JPG" alt="" loading="lazy" />
        <div class="exp-label">
          <span class="exp-name">reaction diffusion contours</span>
          <span class="exp-tag">plotting</span>
        </div>
        <div class="exp-gallery">
          <img src="images/plotting_art/reaction_diffusion_contours/AK2A6369.JPG" alt="" />
          <img src="images/plotting_art/reaction_diffusion_contours/AK2A6372.JPG" alt="" />
          <img src="images/plotting_art/reaction_diffusion_contours/AK2A6380.JPG" alt="" />

          <img src="images/plotting_art/reaction_diffusion_contours/AK2A6434.JPG" alt="" />
        </div>
      </div>

      <div class="experiment" data-title="plotter typography" data-tag="plotting">
        <img class="exp-thumb" src="images/artsy_fartsy/7026E0F6-D198-40EA-B8E7-68CFD37A5E90.jpg" alt="" loading="lazy" />
        <div class="exp-label">
          <span class="exp-name">plotter typography</span>
          <span class="exp-tag">plotting</span>
        </div>
        <div class="exp-gallery">
          <img src="images/artsy_fartsy/7026E0F6-D198-40EA-B8E7-68CFD37A5E90.jpg" alt="" />
          <img src="images/artsy_fartsy/IMG_6858.JPG" alt="" />

          <img src="images/artsy_fartsy/IMG_6864.JPG" alt="" />
        </div>
      </div>

      <div class="experiment" data-title="dash cam slit scans" data-tag="plotting">
        <img class="exp-thumb" src="images/plotting_art/dashcam/clean_slitscan.jpg" alt="" loading="lazy" />

          <span class="exp-name">dash cam slit scans</span>

  </main>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox">
    <div class="lb-header">
      <span class="lb-title"></span>
      <span class="lb-tag"></span>
      <button class="lb-close" aria-label="close">&times;</button>
    </div>
    <div class="lb-main">
      <img class="lb-main-img" src="" alt="" />
    </div>
    <div class="lb-thumbs"></div>
